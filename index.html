<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coffee Punch Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="card" class="card"><!-- optional id added -->
    <!-- —— header area —— -->
    <div class="card-header">
      <img
        src="logo.jpeg"
        alt="CoffeeBeans logo"
        class="logo"
        style="--logo-width: 60px;"
      />
      <h2 class="company-name">You Need Coffee</h2>
    </div>

    <!-- —— punch-card content —— -->
    <p id="status">Loading...</p>
    <div class="cups" id="cups"></div>
    <p class="note">
      This card updates automatically each time you scan the QR code.
    </p>
  </div> <!-- end #card /.card -->

  <!-- —— star rank outside the card —— -->
  <div id="stars" class="stars"></div>

  <!-- Load confetti & your script -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
