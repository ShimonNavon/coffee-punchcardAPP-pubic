<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coffee Punch Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <!-- —— header area —— -->
    <div class="card-header">
      <img
        src="logo.jpeg"
        alt="You Need Coffee logo"
        class="logo"
        style="--logo-width: 60px;"
      >
      <h2 class="company-name">You Need Coffee</h2>
    </div>

    <!-- —— punch‐card content —— -->
    <p id="status">Loading...</p>
    <div class="cups" id="cups"></div>
    <p class="note">
      This card updates automatically each time you scan the QR code.
    </p>
  </div>

  <!-- confetti & your own logic -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
